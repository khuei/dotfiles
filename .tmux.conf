%hidden UNAME="#(uname)"
%hidden TMUX_VERSION="#{s|next-||:#{version}}"
%hidden IS_TMUX_3_3_OR_ABOVE="#{e|>=|f|0:$TMUX_VERSION,3.3}"
%hidden IS_TMUX_3_4_OR_ABOVE="#{e|>=|f|0:$TMUX_VERSION,3.4}"
%hidden IS_TMUX_3_5_OR_ABOVE="#{e|>=|f|0:$TMUX_VERSION,3.5}"

# Symbolic names for "Vim"-like modes.
%hidden NORMAL=0
%hidden VISUAL=1
%hidden VISUAL_LINE=2
%hidden VISUAL_BLOCK=3

# Shorthands.
%hidden IS_COPY_MODE="#{==:#{pane_mode},copy-mode}"

unbind-key C-b
set-option -g prefix C-Space

bind-key -T root M-1 select-window -t :1
bind-key -T root M-2 select-window -t :2
bind-key -T root M-3 select-window -t :3
bind-key -T root M-4 select-window -t :4
bind-key -T root M-5 select-window -t :5
bind-key -T root M-6 select-window -t :6
bind-key -T root M-7 select-window -t :7
bind-key -T root M-8 select-window -t :8
bind-key -T root M-9 select-window -t :9

bind-key -T root M-c new-window -c "#{path_current_path}"
bind-key -T root M-. select-window -n
bind-key -T root M-, select-window -p
bind-key -T root M-< swap-window -t -1
bind-key -T root M-> swap-window -t +1
bind-key -T root M-R command-prompt -I "" "rename-session '%%'"
bind-key -T root M-r command-prompt -I "" "rename-window '%%'"

bind-key -T root M-v split-window -h -c '#{pane_current_path}'
bind-key -T root M-s split-window -v -c '#{pane_current_path}'

bind-key -T root M-h select-pane -L
bind-key -T root M-j select-pane -D
bind-key -T root M-k select-pane -U
bind-key -T root M-l select-pane -R

bind-key -T root M-H run-shell 'old=$(tmux display -p "#{pane_index}"); \
                                tmux select-pane -L; tmux swap-pane -t $old'
bind-key -T root M-J run-shell 'old=$(tmux display -p "#{pane_index}"); \
                                tmux select-pane -D; tmux swap-pane -t $old'
bind-key -T root M-K run-shell 'old=$(tmux display -p "#{pane_index}"); \
                                tmux select-pane -U; tmux swap-pane -t $old'
bind-key -T root M-L run-shell 'old=$(tmux display -p "#{pane_index}"); \
                                tmux select-pane -R; tmux swap-pane -t $old'

bind-key -T root M-f resize-pane -Z
bind-key -T root M-Left resize-pane -L 5
bind-key -T root M-Right resize-pane -R 5
bind-key -T root M-Down resize-pane -D 5
bind-key -T root M-Up resize-pane -U 5

bind-key -T root M-x kill-pane
bind-key -T root M-X kill-window

bind-key -T root M-[ copy-mode
bind-key -T root M-] paste-buffer

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

set-option -g status-style 'bg=#373b41,fg=white,bold,italics'
set-option -g status-left-length 40
set-option -g status-left '#[fg=yellow,bold,italics] #S § '
set-option -g status-right "#[fg=yellow,bold,italics] $USER@#h #[fg=magenta]%H:%M:%S "
set-option -g status-interval 1

set-option -g renumber-windows on

set-option -w -g window-status-current-style fg=default,bg=red

set-option -w -g xterm-keys on

set-option -g mouse on

set-option -w -g main-pane-width 85

set-option -g default-terminal 'tmux-256color'
%if "#{!=:#{m:*Darwin*,$UNAME},1}"
set-option -ga terminal-overrides ',xterm-256color:Tc'
%endif

set-option -g history-limit 1000000

set-option -g base-index 1
set-option -g pane-base-index 1

set-option -g escape-time 0

set-option -g repeat-time 0

set-option -g focus-events on

set-option -w -g automatic-rename off

set-option -w -g wrap-search off

set-option -g set-titles on

set-option -g set-titles-string "#S > #T"

set-option -ga pane-active-border-style bg=default,fg=default

set-option -ga word-separators :/

set-environment -g SHLVL 1

unbind-key -T copy-mode-vi MouseDragEnd1Pane

bind-key -T copy-mode-vi WheelUpPane {
  select-pane
  send-keys -t'{mouse}' -X clear-selection
  send-keys -t'{mouse}' -X -N 3 scroll-up
  set-option -g @mode $NORMAL
}
bind-key -T copy-mode-vi WheelDownPane {
  select-pane
  send-keys -t'{mouse}' -X clear-selection
  send-keys -t'{mouse}' -X -N 3 scroll-down
  set-option -g @mode $NORMAL
}

bind-key -T copy-mode-vi DoubleClick1Pane if-shell -Ft'{mouse}' '#{alternate_on}' \
  "send-keys -M" {
    copy-mode -t'{mouse}'
    send-keys -t'{mouse}' -X select-word
    set-option -g @mode $VISUAL
  }
bind-key -T copy-mode-vi TripleClick1Pane if-shell -Ft'{mouse}' '#{alternate_on}' \
  "send-keys -M" {
    copy-mode -t'{mouse}'
    send-keys -t'{mouse}' -X select-line
    set-option -g @mode $VISUAL_BLOCK
  }

set-hook -g pane-mode-changed {
  if-shell -F '#{==:#{pane_mode},copy-mode}' {
    send-keys -X toggle-position
  }
}

bind-key -T root MouseDrag1Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" {
  send-keys -M
  send-keys -X rectangle-off
  set-option -g @mode $VISUAL
} {
  copy-mode -M
  send-keys -X rectangle-off
  set-option -g @mode $VISUAL
}

bind-key -T root WheelUpPane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" {
  send-keys -M
  if-shell -F "#{pane_in_mode}" "send-keys -X rectangle-off"
  set-option -g @mode $NORMAL
} {
  copy-mode -e
  send-keys -X rectangle-off
  set-option -g @mode $NORMAL
}

bind-key -T copy-mode-vi Escape {
  send-keys -X cancel
  set-option -g @mode $NORMAL
}
bind-key -T copy-mode-vi C-c {
  send-keys -X cancel
  set-option -g @mode $NORMAL
}
bind-key -T copy-mode-vi q {
  send-keys -X cancel
  set-option -g @mode $NORMAL
}

bind-key -T copy-mode-vi Enter {
  send-keys -X copy-pipe-and-cancel clip
  set-option -g @mode $NORMAL
}
bind-key -T copy-mode-vi y {
  send-keys -X copy-pipe-and-cancel clip
  set-option -g @mode $NORMAL
}

bind-key -T copy-mode-vi v if-shell -F '#{selection_present}' {
    if-shell -F '#{||:#{==:#{@mode},#{VISUAL_BLOCK}},#{==:#{@mode},#{VISUAL_LINE}}}' {
      send-keys -X rectangle-off
      set-option -g @mode $VISUAL
    } {
      send-keys -X rectangle-off
      send-keys -X clear-selection
      set-option -g @mode $NORMAL
    }
  } {
    send-keys -X rectangle-off
    send-keys -X begin-selection
    set-option -g @mode $VISUAL
  }

bind-key -T copy-mode-vi C-v if-shell -F '#{selection_present}' {
    if-shell -F '#{||:#{==:#{@mode},#{VISUAL}},#{==:#{@mode},#{VISUAL_LINE}}}' {
      send-keys -X rectangle-on
      set-option -g @mode $VISUAL_BLOCK
    } {
      send-keys -X rectangle-off
      send-keys -X clear-selection
      set-option -g @mode $NORMAL
    }
  } {
    send-keys -X rectangle-on
    send-keys -X begin-selection
    set-option -g @mode $VISUAL_BLOCK
  }

bind-key -T copy-mode-vi V if-shell -F '#{selection_present}' {
    if-shell -F '#{||:#{==:#{@mode},#{VISUAL}},#{==:#{@mode},#{VISUAL_BLOCK}}}' {
      send-keys -X rectangle-off
      send-keys -X select-line
      set-option -g @mode $VISUAL_LINE
    } {
      send-keys -X clear-selection
      set-option -g @mode $NORMAL
    }
  } {
    send-keys -X rectangle-off
    send-keys -X select-line
    set-option -g @mode $VISUAL_LINE
  }

%if $IS_TMUX_3_4_OR_ABOVE
bind-key o {
  copy-mode
  send-keys -X previous-prompt
}
bind-key -T copy-mode-vi -r o {
  send-keys -X previous-prompt
}
bind-key i {
  copy-mode
  send-keys -X next-prompt
}
bind-key -T copy-mode-vi -r i {
  send-keys -X next-prompt
}
%else
bind-key o {
  copy-mode
  send-keys -X start-of-line
  send-keys -X search-backward "❯"
  send-keys -X cursor-right
  send-keys -X cursor-right
}
bind-key -T copy-mode-vi -r o {
  send-keys -X start-of-line
  send-keys -X search-backward "❯"
  send-keys -X cursor-right
  send-keys -X cursor-right
}
bind-key i {
  copy-mode
  send-keys -X end-of-line
  send-keys -X search-forward "❯"
  send-keys -X cursor-right
  send-keys -X cursor-right
}
bind-key -T copy-mode-vi -r i {
  send-keys -X end-of-line
  send-keys -X search-forward "❯"
  send-keys -X cursor-right
  send-keys -X cursor-right
}
%endif

%hidden COPY_MODE_MARKER="#[align=left#,fg=green#,bg=black] ----- COPY ----- #[default]"
%hidden COPY_MODE_LEFT="$COPY_MODE_MARKER"
%hidden HAS_SEARCH_RESULT="#{&&:#{e|>|:#{search_count},0},#{search_present}}"
%hidden RESULT_OR_RESULTS="result#{?#{==:#{search_count},1},,s}"
%hidden RESULT_COUNT_IS_PARTIAL="#{e|>|:#{search_count_partial},0}"
%hidden SEARCH_RESULT_COUNT="(#{search_count}#{?$RESULT_COUNT_IS_PARTIAL,+,} $RESULT_OR_RESULTS)"
%hidden OFFSET_FROM_TOP="#{e|-|:#{history_size},#{scroll_position}}"
%hidden COPY_MODE_LOCATION="[$OFFSET_FROM_TOP/#{history_size}]"
%hidden COPY_MODE_CENTER="#[align=centre#,bg=black]#[default]"

%if $IS_TMUX_3_5_OR_ABOVE
%hidden COPY_MODE_RIGHT="#[align=right#,bg=black]  #{?$HAS_SEARCH_RESULT,$SEARCH_RESULT_COUNT  ,}$COPY_MODE_LOCATION  #[default]"
%else
%hidden COPY_MODE_RIGHT="#[align=right#,bg=black]  $COPY_MODE_LOCATION  #[default]"
%endif

%hidden IS_SSH_PANE="#{==:#{pane_current_command},ssh}"
%hidden PANE_INFO="#{?$IS_SSH_PANE,#[align=right#,fg=cyan#,bold] #{pane_title} #[default],}---"

set-option -g pane-border-lines single
set-option -g pane-border-status bottom
set-option -g pane-border-format "#{?$IS_COPY_MODE,$COPY_MODE_LEFT$COPY_MODE_CENTER$COPY_MODE_RIGHT,}#{?$IS_SSH_PANE,$PANE_INFO,}"
